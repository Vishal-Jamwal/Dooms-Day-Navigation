version: "3.8"
services:
  osrm:
    image: osrm/osrm-backend:latest
    volumes:
      - ./backend/data:/data
    ports:
      - "5000:5000"
    command: ["sh", "-c", "osrm-extract -p /opt/car.lua /data/eastern-zone-260111.osm.pbf && osrm-contract /data/eastern-zone-260111.osm.pbf && osrm-routed --algorithm mld /data/eastern-zone-260111.osm.pbf"]

  backend:
    build:
      context: ./backend
    ports:
      - "3001:3000"
    depends_on:
      - osrm
    volumes:
      - ./backend:/app:cached
      - backend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=production
      - OSRM_HOST=osrm
      - OSRM_PORT=5000

  frontend:
    build:
      context: ./frontend
    ports:
      - "5174:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app:cached
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development

volumes:
  backend_node_modules:
  frontend_node_modules:
